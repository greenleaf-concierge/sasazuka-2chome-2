<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#fdf6ee">
<title>Wi-Fi information — Sasazuka 2Chōme
笹塚2丁目</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;600;700;800;900&family=Pacifico&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/site.css">
</head>
<body>
<main>
<div class="top"><a class="back" href="../">←</a><h1>📶 Wi-Fi information</h1></div>
<article class="wifi-detail" aria-labelledby="wifi-page-title">
<div class="wifi-detail-head"><span class="wifi-head-emoji" aria-hidden="true">📶</span><div><p class="eyebrow">Wi-Fi</p><h2 id="wifi-page-title">Connect to the Wi-Fi</h2><p>カメラでQRコードを読み取るか、下の情報をコピーして接続してください。</p></div></div>
<div class="wifi-rows"><button class="wifi-row wifi-row-light" onclick="copyWifi(this, 'TP-Link_61E8')" aria-label="Copy network name"><span class="wifi-row-label">Network</span><span class="wifi-row-val">TP-Link_61E8</span><span class="wifi-row-action" aria-hidden="true">⧉</span></button><button class="wifi-row wifi-row-light" onclick="copyWifi(this, '45441745')" aria-label="Copy password"><span class="wifi-row-label">Password</span><span class="wifi-row-val">45441745</span><span class="wifi-row-action" aria-hidden="true">⧉</span></button></div>
<div class="wifi-qr visible"><img src="../images/wifi-qr.png" alt="Wi-Fi QR code for TP-Link_61E8" width="320" height="320"><p class="wifi-qr-hint">Scan with your camera to connect</p></div>
</article>

</main>
<script>
function copyWifi(el, text) {
  navigator.clipboard?.writeText(text);
  const old = el.querySelector('.wifi-row-action')?.textContent || '⧉';
  el.classList.add('copied');
  const action = el.querySelector('.wifi-row-action');
  if (action) action.textContent = '✓';
  setTimeout(() => {
    el.classList.remove('copied');
    if (action) action.textContent = old;
  }, 1100);
}
</script>
</body>
</html>
