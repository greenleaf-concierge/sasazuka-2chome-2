<script>
const STRINGS={"en":{"title":"Route to Accommodations","html":"\u003cp>Use this page to find the accommodation from Sasazuka Station.\u003c/p>\u003ch3>Address\u003c/h3>\u003ch4>Tokyo, Shibuya, Sasazuka, 2-chome-37-7 〒151-0073\u003c/h4>\u003cp>Google Maps may not show the exact entrance. Please refer to the marked location below.\u003c/p>\u003ch3>Nearest Station\u003c/h3>\u003cp>Sasazuka Station (Keio Line), about 8 minutes on foot.\u003c/p>\u003ch3>From Sasazuka Station\u003c/h3>\u003cp>Follow the photos below from the station to the accommodation.\u003c/p>"},"ja":{"title":"宿泊施設へのご案内","html":"\u003cp>笹塚駅から宿泊施設までの行き方です。\u003c/p>\u003ch3>住所\u003c/h3>\u003ch4>〒151-0073 東京都渋谷区笹塚2-37-7\u003c/h4>\u003cp>Google Mapsでは入口位置が正確に表示されない場合があります。下の印の場所を参考にしてください。\u003c/p>\u003ch3>最寄り駅\u003c/h3>\u003cp>笹塚駅（京王線）徒歩約8分です。\u003c/p>\u003ch3>笹塚駅から宿泊施設まで\u003c/h3>\u003cp>駅から宿泊施設までは、以下の写真を順番にご確認ください。\u003c/p>"},"zh":{"title":"前往住宿","html":"\u003cp>请使用本页从笹塚站前往住宿。\u003c/p>\u003ch3>地址\u003c/h3>\u003ch4>东京都涩谷区笹塚2-37-7 〒151-0073\u003c/h4>\u003cp>Google Maps 可能无法准确显示入口位置。请参考下方标记的位置。\u003c/p>\u003ch3>最近车站\u003c/h3>\u003cp>笹塚站（京王线），步行约8分钟。\u003c/p>\u003ch3>从笹塚站出发\u003c/h3>\u003cp>请按照下方照片从车站前往住宿。\u003c/p>"},"ko":{"title":"숙소까지 가는 길","html":"\u003cp>사사즈카역에서 숙소까지 가는 방법입니다.\u003c/p>\u003ch3>주소\u003c/h3>\u003ch4>도쿄도 시부야구 사사즈카 2-37-7 〒151-0073\u003c/h4>\u003cp>Google Maps에 입구 위치가 정확히 표시되지 않을 수 있습니다. 아래 표시된 위치를 참고해 주세요.\u003c/p>\u003ch3>가장 가까운 역\u003c/h3>\u003cp>사사즈카역(게이오선), 도보 약 8분.\u003c/p>\u003ch3>사사즈카역에서 숙소까지\u003c/h3>\u003cp>아래 사진 순서대로 이동해 주세요.\u003c/p>"},"fr":{"title":"Acces au logement","html":"\u003cp>Utilisez cette page pour rejoindre le logement depuis la gare de Sasazuka.\u003c/p>\u003ch3>Adresse\u003c/h3>\u003ch4>Tokyo, Shibuya, Sasazuka, 2-chome-37-7 〒151-0073\u003c/h4>\u003cp>Google Maps peut ne pas indiquer exactement l'entree. Veuillez vous referer au point marque ci-dessous.\u003c/p>\u003ch3>Gare la plus proche\u003c/h3>\u003cp>Gare de Sasazuka (ligne Keio), environ 8 minutes a pied.\u003c/p>\u003ch3>Depuis la gare de Sasazuka\u003c/h3>\u003cp>Suivez les photos ci-dessous pour rejoindre le logement.\u003c/p>"},"es":{"title":"Ruta al alojamiento","html":"\u003cp>Use esta pagina para llegar al alojamiento desde la estacion Sasazuka.\u003c/p>\u003ch3>Direccion\u003c/h3>\u003ch4>Tokyo, Shibuya, Sasazuka, 2-chome-37-7 〒151-0073\u003c/h4>\u003cp>Google Maps puede no mostrar la entrada exacta. Consulte la ubicacion marcada abajo.\u003c/p>\u003ch3>Estacion mas cercana\u003c/h3>\u003cp>Estacion Sasazuka (linea Keio), unos 8 minutos a pie.\u003c/p>\u003ch3>Desde la estacion Sasazuka\u003c/h3>\u003cp>Siga las fotos de abajo hasta el alojamiento.\u003c/p>"}};
const LABELS={
  en:{network:'Network',password:'Password',qr:'Scan with your camera to connect'},
  ja:{network:'ネットワーク',password:'パスワード',qr:'カメラで読み取って接続できます'},
  zh:{network:'网络',password:'密码',qr:'用相机扫描即可连接'},
  ko:{network:'네트워크',password:'비밀번호',qr:'카메라로 스캔하여 연결하세요'},
  fr:{network:'Reseau',password:'Mot de passe',qr:'Scannez avec votre appareil photo'},
  es:{network:'Red',password:'Contrasena',qr:'Escanee con la camara'}
};
function setLang(lang, btn){
  const t=STRINGS[lang]||STRINGS.en;
  document.documentElement.lang=lang;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  document.querySelector('[data-title]').textContent=t.title;
  document.querySelector('[data-content]').innerHTML=t.html;
  const labels=LABELS[lang]||LABELS.en;
  document.querySelectorAll('[data-label]').forEach(el=>{ const k=el.getAttribute('data-label'); if(labels[k]) el.textContent=labels[k]; });
  localStorage.setItem('sasazukaLang', lang);
}
function copyWifi(el,text){
  navigator.clipboard?.writeText(text);
  const action=el.querySelector('.wifi-row-action');
  const old=action?.textContent||'⧉';
  el.classList.add('copied');
  if(action) action.textContent='✓';
  setTimeout(()=>{el.classList.remove('copied'); if(action) action.textContent=old;},1100);
}
const saved=localStorage.getItem('sasazukaLang')||'en';
const btn=document.querySelector(`.lang-btn[onclick*="'${saved}'"]`);
setLang(saved, btn||document.querySelector('.lang-btn'));
</script>
