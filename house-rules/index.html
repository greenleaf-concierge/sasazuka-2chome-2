<style>.sub-lang-bar{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;padding:10px 12px 12px}.sub-lang-bar .lang-btn.active{background:var(--teal-dark);color:#fff;border-color:var(--teal-dark)}.content a,.wifi-detail a{color:var(--teal-dark);font-weight:900}.content ul{font-weight:750}.content strong{color:var(--teal-dark)}</style>
</head>
<body>
<main>
<nav class="sub-lang-bar" aria-label="Language"><button class="lang-btn active" onclick="setLang('en', this)">EN</button><button class="lang-btn" onclick="setLang('ja', this)">JA</button><button class="lang-btn" onclick="setLang('zh', this)">ZH</button><button class="lang-btn" onclick="setLang('ko', this)">KO</button><button class="lang-btn" onclick="setLang('fr', this)">FR</button><button class="lang-btn" onclick="setLang('es', this)">ES</button></nav>
<div class="top"><a class="back" href="../">←</a><h1><span aria-hidden="true">📋</span> <span data-title>House Rules</span></h1></div>
<article class="content"><div data-content></div>
</article>
</main>
<script>
const STRINGS={"en":{"title":"House Rules","html":"\u003ch3>House Rules\u003c/h3>\u003cul>\u003cli>Quiet hours: 22:00 - 8:00.\u003c/li>\u003cli>No smoking, including the balcony and building common areas.\u003c/li>\u003cli>Please remove your shoes inside the room.\u003c/li>\u003cli>Please lock the door when sleeping or going out.\u003c/li>\u003cli>Please turn off lights and air conditioning when going out.\u003c/li>\u003cli>Check-in 16:00 / Check-out 10:00.\u003c/li>\u003cli>Key loss or unreturned key may require a replacement charge.\u003c/li>\u003c/ul>"},"ja":{"title":"ハウスルール","html":"\u003ch3>ハウスルール\u003c/h3>\u003cul>\u003cli>静粛時間: 22:00 - 8:00。\u003c/li>\u003cli>室内、バルコニー、建物共用部は禁煙です。\u003c/li>\u003cli>室内では靴を脱いでください。\u003c/li>\u003cli>就寝時・外出時は必ず施錠してください。\u003c/li>\u003cli>外出時は照明とエアコンを消してください。\u003c/li>\u003cli>チェックイン 16:00 / チェックアウト 10:00。\u003c/li>\u003cli>鍵の紛失・未返却は交換費用が発生する場合があります。\u003c/li>\u003c/ul>"},"zh":{"title":"住宿规则","html":"\u003ch3>住宿规则\u003c/h3>\u003cul>\u003cli>安静时间: 22:00 - 8:00。\u003c/li>\u003cli>室内、阳台及公共区域禁止吸烟。\u003c/li>\u003cli>进入房间请脱鞋。\u003c/li>\u003cli>睡觉或外出时请锁门。\u003c/li>\u003cli>外出时请关闭灯和空调。\u003c/li>\u003cli>入住 16:00 / 退房 10:00。\u003c/li>\u003cli>钥匙遗失或未归还可能产生更换费用。\u003c/li>\u003c/ul>"},"ko":{"title":"하우스 룰","html":"\u003ch3>하우스 룰\u003c/h3>\u003cul>\u003cli>조용한 시간: 22:00 - 8:00.\u003c/li>\u003cli>객실, 발코니, 공용 구역은 금연입니다.\u003c/li>\u003cli>실내에서는 신발을 벗어 주세요.\u003c/li>\u003cli>취침 또는 외출 시 문을 잠가 주세요.\u003c/li>\u003cli>외출 시 조명과 에어컨을 꺼 주세요.\u003c/li>\u003cli>체크인 16:00 / 체크아웃 10:00.\u003c/li>\u003cli>열쇠 분실 또는 미반납 시 교체 비용이 발생할 수 있습니다.\u003c/li>\u003c/ul>"},"fr":{"title":"Regles de la maison","html":"\u003ch3>Regles de la maison\u003c/h3>\u003cul>\u003cli>Heures calmes: 22:00 - 8:00.\u003c/li>\u003cli>Interdiction de fumer, y compris sur le balcon et dans les espaces communs.\u003c/li>\u003cli>Veuillez retirer vos chaussures dans la chambre.\u003c/li>\u003cli>Verrouillez la porte en dormant ou en sortant.\u003c/li>\u003cli>Eteignez les lumieres et la climatisation en sortant.\u003c/li>\u003cli>Arrivee 16:00 / Depart 10:00.\u003c/li>\u003cli>Une cle perdue ou non rendue peut entrainer des frais.\u003c/li>\u003c/ul>"},"es":{"title":"Reglas de la casa","html":"\u003ch3>Reglas de la casa\u003c/h3>\u003cul>\u003cli>Horario de silencio: 22:00 - 8:00.\u003c/li>\u003cli>No fumar, incluido el balcon y las zonas comunes.\u003c/li>\u003cli>Quitese los zapatos dentro de la habitacion.\u003c/li>\u003cli>Cierre la puerta al dormir o salir.\u003c/li>\u003cli>Apague luces y aire acondicionado al salir.\u003c/li>\u003cli>Check-in 16:00 / Check-out 10:00.\u003c/li>\u003cli>La perdida o no devolucion de la llave puede generar un cargo.\u003c/li>\u003c/ul>"}};
const LABELS={
  en:{network:'Network',password:'Password',qr:'Scan with your camera to connect'},
  ja:{network:'ネットワーク',password:'パスワード',qr:'カメラで読み取って接続できます'},
  zh:{network:'网络',password:'密码',qr:'用相机扫描即可连接'},
  ko:{network:'네트워크',password:'비밀번호',qr:'카메라로 스캔하여 연결하세요'},
  fr:{network:'Reseau',password:'Mot de passe',qr:'Scannez avec votre appareil photo'},
  es:{network:'Red',password:'Contrasena',qr:'Escanee con la camara'}
};
function setLang(lang, btn){
  const t=STRINGS[lang]||STRINGS.en;
  document.documentElement.lang=lang;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  document.querySelector('[data-title]').textContent=t.title;
  document.querySelector('[data-content]').innerHTML=t.html;
  const labels=LABELS[lang]||LABELS.en;
  document.querySelectorAll('[data-label]').forEach(el=>{ const k=el.getAttribute('data-label'); if(labels[k]) el.textContent=labels[k]; });
  localStorage.setItem('sasazukaLang', lang);
}
function copyWifi(el,text){
  navigator.clipboard?.writeText(text);
  const action=el.querySelector('.wifi-row-action');
  const old=action?.textContent||'⧉';
  el.classList.add('copied');
  if(action) action.textContent='✓';
  setTimeout(()=>{el.classList.remove('copied'); if(action) action.textContent=old;},1100);
}
const saved=localStorage.getItem('sasazukaLang')||'en';
const btn=document.querySelector(`.lang-btn[onclick*="'${saved}'"]`);
setLang(saved, btn||document.querySelector('.lang-btn'));
</script>
</body>
</html>
